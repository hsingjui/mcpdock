name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            arch: arm64
            artifact: MCPDock-macos-arm64
            install_mode: installed
          - platform: macos-14
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            arch: x64
            artifact: MCPDock-macos-x64
            install_mode: installed
          - platform: windows-2022
            args: ''
            target: ''
            arch: x64
            artifact: MCPDock-windows-x64-installed
            install_mode: installed
          - platform: windows-2022
            args: ''
            target: ''
            arch: x64
            artifact: MCPDock-windows-x64-portable
            install_mode: portable
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.args == '--target x86_64-apple-darwin' && 'x86_64-apple-darwin' || '' }}

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app (installed)
        if: matrix.install_mode == 'installed'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Build Tauri app (portable)
        if: matrix.install_mode == 'portable'
        run: pnpm tauri build --no-bundle -- --features portable

      - name: Prepare macOS assets
        if: matrix.platform == 'macos-14'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.arch }}"
          TARGET="${{ matrix.target }}"
          BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          mkdir -p release-assets

          # DMG
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" -type f | head -1)
          cp "$DMG" "release-assets/MCPDock-${VERSION}-${ARCH}.dmg"

          # Updater tar.gz + sig
          TAR_GZ=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" -type f | head -1)
          cp "$TAR_GZ" "release-assets/MCPDock-${VERSION}-${ARCH}-updater.tar.gz"
          if [ -f "${TAR_GZ}.sig" ]; then
            cp "${TAR_GZ}.sig" "release-assets/MCPDock-${VERSION}-${ARCH}-updater.tar.gz.sig"
          fi

      - name: Prepare Windows installed assets
        if: matrix.platform == 'windows-2022' && matrix.install_mode == 'installed'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $VERSION = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          # MSI + sig
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Filter '*.msi' -Recurse | Select-Object -First 1
          Copy-Item $msi.FullName "release-assets/MCPDock-$VERSION-x64.msi"
          $sigPath = "$($msi.FullName).sig"
          if (Test-Path $sigPath) {
            Copy-Item $sigPath "release-assets/MCPDock-$VERSION-x64.msi.sig"
          }

      - name: Prepare Windows portable assets
        if: matrix.platform == 'windows-2022' && matrix.install_mode == 'portable'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $VERSION = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          # Portable zip (no portable.ini needed — mode is baked in at compile time)
          $portableDir = 'release-assets/MCPDock-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item 'src-tauri/target/release/MCPDock.exe' $portableDir
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/MCPDock-$VERSION-x64-Portable.zip" -Force
          Remove-Item -Recurse -Force $portableDir

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: MCPDock-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -la release-assets/

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          REPO="${GITHUB_REPOSITORY}"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Find updater signatures
          MAC_ARM_SIG=""
          MAC_ARM_URL=""
          MAC_X64_SIG=""
          MAC_X64_URL=""
          WIN_X64_SIG=""
          WIN_X64_URL=""

          for sig in release-assets/*.tar.gz.sig release-assets/*.msi.sig; do
            [ -f "$sig" ] || continue
            SIG_CONTENT=$(cat "$sig")
            FNAME=$(basename "${sig%.sig}")

            case "$FNAME" in
              *arm64-updater.tar.gz)
                MAC_ARM_SIG="$SIG_CONTENT"
                MAC_ARM_URL="$BASE_URL/$FNAME"
                ;;
              *x64-updater.tar.gz)
                MAC_X64_SIG="$SIG_CONTENT"
                MAC_X64_URL="$BASE_URL/$FNAME"
                ;;
              *x64.msi)
                WIN_X64_SIG="$SIG_CONTENT"
                WIN_X64_URL="$BASE_URL/$FNAME"
                ;;
            esac
          done

          # Build JSON with jq
          ARGS=()
          ARGS+=("--arg" "version" "$VERSION")
          ARGS+=("--arg" "notes" "Release $TAG")
          ARGS+=("--arg" "pub_date" "$PUB_DATE")

          PLATFORMS='{}'
          if [ -n "$MAC_ARM_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_ARM_SIG" --arg url "$MAC_ARM_URL" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$MAC_X64_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_X64_SIG" --arg url "$MAC_X64_URL" \
              '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi
          if [ -n "$WIN_X64_SIG" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WIN_X64_SIG" --arg url "$WIN_X64_URL" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release $TAG" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MCPDock ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: false
          files: |
            release-assets/*
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append download section to release body
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Fetch the auto-generated release body
          EXISTING_BODY=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body')

          # Skip if download section already exists (e.g. workflow re-run)
          if echo "$EXISTING_BODY" | grep -q '### 下载安装'; then
            echo "Download section already exists, skipping."
            exit 0
          fi

          # Build the download section
          cat > download_section.md <<'EOF'

          ---

          ### 下载安装

          | 平台 | 文件 | 说明 |
          | --- | --- | --- |
          EOF

          echo "| macOS (Apple Silicon) | [MCPDock-${TAG}-arm64.dmg](https://github.com/${REPO}/releases/download/${TAG}/MCPDock-${TAG}-arm64.dmg) | |" >> download_section.md
          echo "| macOS (Intel) | [MCPDock-${TAG}-x64.dmg](https://github.com/${REPO}/releases/download/${TAG}/MCPDock-${TAG}-x64.dmg) | |" >> download_section.md
          echo "| Windows | [MCPDock-${TAG}-x64.msi](https://github.com/${REPO}/releases/download/${TAG}/MCPDock-${TAG}-x64.msi) | 安装版 |" >> download_section.md
          echo "| Windows | [MCPDock-${TAG}-x64-Portable.zip](https://github.com/${REPO}/releases/download/${TAG}/MCPDock-${TAG}-x64-Portable.zip) | 便携版 |" >> download_section.md

          cat >> download_section.md <<'EOF'

          #### macOS 安装提示

          MCPDock 未使用 Apple Developer 证书签名，首次安装后系统可能会阻止运行。若遇到此情况，请在终端执行：

          ```bash
          xattr -rd com.apple.quarantine /Applications/MCPDock.app
          ```

          > `.tar.gz` 和 `.sig` 为 Tauri 自动更新专用，无需手动下载。
          EOF

          # Combine: existing auto-generated body + download section
          printf '%s\n' "$EXISTING_BODY" > release_body.md
          cat download_section.md >> release_body.md

          # Update the release with the combined body (keep as draft)
          gh release edit "$TAG" --repo "$REPO" --draft --notes-file release_body.md

          echo "Updated release body:"
          cat release_body.md
